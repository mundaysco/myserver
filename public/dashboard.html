<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clover Merchant Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 1.1em;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin: 5px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn.secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #667eea;
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            margin-left: 10px;
        }
        
        .status-open {
            background: #d4edda;
            color: #155724;
        }
        
        .status-closed {
            background: #f8d7da;
            color: #721c24;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .info-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .info-item h3 {
            color: #555;
            font-size: 0.9em;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .info-item p {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
        }
        
        .data-display {
            background: #333;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            font-family: monospace;
            max-height: 400px;
            overflow: auto;
            display: none;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .connection-status {
            padding: 10px 20px;
            border-radius: 10px;
            margin: 10px 0;
            font-weight: 600;
        }
        
        .connected {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        
        .disconnected {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏪 Clover Merchant Dashboard</h1>
            <p>Real-time business insights and management</p>
        </div>
        
        <div class="card">
            <h2>🔗 Connection Status</h2>
            <div class="connection-status" id="connectionStatus">
                Checking connection to Clover...
            </div>
            <div>
                <button class="btn" onclick="checkConnection()">
                    <span>🔄 Check Connection</span>
                </button>
                <button class="btn secondary" onclick="openDashboard()">
                    <span>🧈 Open Butter Dashboard</span>
                </button>
            </div>
        </div>
        
        <div class="card" id="merchantCard" style="display: none;">
            <h2>🏢 Business Information</h2>
            <div class="info-grid">
                <div class="info-item">
                    <h3>Business Name</h3>
                    <p id="businessName">Loading...</p>
                </div>
                <div class="info-item">
                    <h3>Status</h3>
                    <p><span id="businessStatus" class="status-badge">Checking...</span></p>
                </div>
                <div class="info-item">
                    <h3>Address</h3>
                    <p id="businessAddress">Loading...</p>
                </div>
                <div class="info-item">
                    <h3>Phone</h3>
                    <p id="businessPhone">Loading...</p>
                </div>
            </div>
            <button class="btn" onclick="refreshMerchantInfo()">
                <span>🔄 Refresh Business Info</span>
            </button>
        </div>
        
        <div class="card">
            <h2>🚀 Quick Actions</h2>
            <div>
                <button class="btn" onclick="viewOrders()">
                    <span>📦 View Recent Orders</span>
                </button>
                <button class="btn" onclick="viewInventory()">
                    <span>📋 View Inventory</span>
                </button>
                <button class="btn" onclick="viewEmployees()">
                    <span>👥 View Employees</span>
                </button>
                <button class="btn secondary" onclick="viewTokens()">
                    <span>🔐 View Stored Tokens</span>
                </button>
            </div>
        </div>
        
        <div class="card">
            <h2>📊 API Data</h2>
            <div id="loading" class="loading" style="display: none;">
                ⏳ Loading data from Clover...
            </div>
            <div id="dataDisplay" class="data-display">
                <!-- Data will appear here -->
            </div>
            <div id="errorDisplay" style="display: none; color: #dc3545; padding: 10px; background: #f8d7da; border-radius: 5px; margin-top: 10px;">
                <!-- Errors will appear here -->
            </div>
        </div>
    </div>

    <script>
        // Check connection on page load
        window.onload = function() {
            checkConnection();
        };
        
        function openDashboard() {
            window.open('/', '_blank');
        }
        
        async function checkConnection() {
            const statusEl = document.getElementById('connectionStatus');
            statusEl.textContent = "Checking connection...";
            statusEl.className = "connection-status";
            
            try {
                const response = await fetch('/auth/tokens');
                const data = await response.json();
                
                if (data.success && data.count > 0) {
                    statusEl.textContent = `✅ Connected to merchant: ${data.merchants[0]}`;
                    statusEl.classList.add('connected');
                    
                    // Show merchant card
                    document.getElementById('merchantCard').style.display = 'block';
                    
                    // Load merchant info
                    refreshMerchantInfo();
                } else {
                    statusEl.textContent = "❌ Not connected to any merchant";
                    statusEl.classList.add('disconnected');
                    document.getElementById('merchantCard').style.display = 'none';
                }
            } catch (error) {
                statusEl.textContent = "❌ Connection check failed";
                statusEl.classList.add('disconnected');
            }
        }
        
        async function refreshMerchantInfo() {
            showLoading(true);
            hideError();
            
            try {
                const response = await fetch('/auth/merchant');
                const data = await response.json();
                
                if (data.success) {
                    const merchant = data.data;
                    
                    // Update UI with merchant info
                    document.getElementById('businessName').textContent = merchant.name || 'Unknown Business';
                    document.getElementById('businessAddress').textContent = 
                        `${merchant.address?.address1 || ''}, ${merchant.address?.city || ''}, ${merchant.address?.state || ''}`.trim() || 'Not available';
                    document.getElementById('businessPhone').textContent = merchant.phone || 'Not available';
                    
                    // Update status
                    const statusEl = document.getElementById('businessStatus');
                    statusEl.textContent = merchant.isOpen ? 'OPEN' : 'CLOSED';
                    statusEl.className = merchant.isOpen ? 'status-badge status-open' : 'status-badge status-closed';
                    
                } else {
                    showError('Failed to load merchant info: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                showError('Network error: ' + error.message);
            } finally {
                showLoading(false);
            }
        }
        
        async function viewOrders() {
            showLoading(true);
            hideError();
            
            try {
                const response = await fetch('/auth/orders?limit=5');
                const data = await response.json();
                displayData('Recent Orders', data);
            } catch (error) {
                showError('Failed to load orders: ' + error.message);
            } finally {
                showLoading(false);
            }
        }
        
        async function viewInventory() {
            showLoading(true);
            hideError();
            
            try {
                const response = await fetch('/auth/items?limit=10');
                const data = await response.json();
                displayData('Inventory Items', data);
            } catch (error) {
                showError('Failed to load inventory: ' + error.message);
            } finally {
                showLoading(false);
            }
        }
        
        async function viewEmployees() {
            showLoading(true);
            hideError();
            
            try {
                const response = await fetch('/auth/employees');
                const data = await response.json();
                displayData('Employees', data);
            } catch (error) {
                showError('Failed to load employees: ' + error.message);
            } finally {
                showLoading(false);
            }
        }
        
        async function viewTokens() {
            showLoading(true);
            hideError();
            
            try {
                const response = await fetch('/auth/tokens');
                const data = await response.json();
                displayData('Stored Tokens', data);
            } catch (error) {
                showError('Failed to load tokens: ' + error.message);
            } finally {
                showLoading(false);
            }
        }
        
        function displayData(title, data) {
            const displayEl = document.getElementById('dataDisplay');
            displayEl.style.display = 'block';
            displayEl.innerHTML = `
                <h3 style="margin-top: 0; color: #667eea;">${title}</h3>
                <pre style="margin: 0; white-space: pre-wrap;">${JSON.stringify(data, null, 2)}</pre>
            `;
        }
        
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
        
        function showError(message) {
            const errorEl = document.getElementById('errorDisplay');
            errorEl.textContent = '❌ ' + message;
            errorEl.style.display = 'block';
        }
        
        function hideError() {
            document.getElementById('errorDisplay').style.display = 'none';
        }
    </script>
</body>
</html>
